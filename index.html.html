/* ─── SERVICE WORKER (PWA offline) ─── */
if('serviceWorker' in navigator){
  const SW = `
    const CACHE='apex-v1';
    const PRECACHE=['/'];
    self.addEventListener('install',e=>{ e.waitUntil(caches.open(CACHE).then(c=>c.addAll(PRECACHE))); self.skipWaiting(); });
    self.addEventListener('activate',e=>{ e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k))))); self.clients.claim(); });
    self.addEventListener('fetch',e=>{
      if(e.request.method!=='GET')return;
      e.respondWith(fetch(e.request).then(r=>{ const c=r.clone(); caches.open(CACHE).then(cache=>cache.put(e.request,c)); return r; }).catch(()=>caches.match(e.request)));
    });
  `;
  const blob = new Blob([SW],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

  const[area,setArea]=useState(null);

      out.push({key:`${d.getMonth()+1}-${d.getDate()}`,m:d.getMonth()+1,d:d.getDate(),dow:['일','월','화','수','목','금','토'][d.getDay()],we:d.getDay()===0||d.getDay()===6});

  },[]);
  const canNext=(step===1&&pb)||(step===2&&area)||(step===3&&date&&selTime);

    setBookings(b=>[{id:'b'+Date.now(),type:'consult',title:`${selPb?.name} ${selPb?.title} · ${CONSULT_AREAS.find(a=>a.id===area)?.label}`,date:`5월 ${date?.split('-')[1]}일 ${selTime}`,status:'대기',code:genCode()},...b]);

        <div style={{display:'flex',gap:8,overflowX:'auto',scrollbarWidth:'none',paddingBottom:16,WebkitOverflowScrolling:'touch'}}>
          {days.map(d=>{const on=date===d.key;return(

    <div style={{padding:'0 20px 20px',display:'flex',flexDirection:'column',gap:8}}>
      {[['◈','전담 PB 1:1 서비스','24시간 우선 연결'],['◇','프리미엄 행사 초청','문화·세미나 연 12+ 회'],['◉','헤리티지 서비스','상속·증여 전문 설계']].map(([ic,t,s])=>(
        <div key={t} style={{display:'flex',alignItems:'center',gap:13,padding:'13px 15px',borderRadius:14,background:T.surface,border:`0.5px solid ${T.hairline}`}}>
          <span style={{fontSize:20,color:T.gold,flexShrink:0}}>{ic}</span>
          <div><div style={{fontFamily:T.fontKr,fontSize:13,fontWeight:600,color:T.textHi}}>{t}</div>
            <div style={{fontSize:11,color:T.textMid,marginTop:2}}>{s}</div></div>
        </div>
      ))}
    </div>
    <div style={{padding:'0 20px 8px'}}><Ey>ACCOUNT</Ey></div>
    <div style={{padding:'4px 20px'}}>
      <Cd p={0}>
        {[{l:'내 신청 내역',s:`${bookings.length}건`,go:'bookings'},{l:'PB 상담 예약',s:'강현우 수석',go:'consult'},{l:'관심 행사',s:`${favorited.size}건`},{l:'알림 설정'},{l:'회원 혜택 안내'},{l:'로그아웃',danger:true}].map((m,i,a)=>(
          <button key={m.l} onClick={()=>m.go&&nav(m.go)} style={{display:'flex',alignItems:'center',width:'100%',padding:'15px 16px',background:'transparent',border:'none',borderBottom:i<a.length-1?`0.5px solid ${T.divider}`:'none',cursor:'pointer',textAlign:'left',outline:'none'}}>
            <span style={{flex:1,fontFamily:T.fontKr,fontSize:14,color:m.danger?T.red:T.textHi,letterSpacing:-0.2}}>{m.l}</span>
            {m.s&&<span style={{fontSize:12,color:T.textMid,marginRight:8}}>{m.s}</span>}
            {!m.danger&&<span style={{color:T.textLow,fontSize:16}}>›</span>}
          </button>
        ))}
      </Cd>
    </div>
  </div>;
}

function NotifsScreen({onBack,notifs,markAllRead}){
  const meta={event:{color:T.gold,label:'행사',icon:'◇'},consult:{color:T.blue,label:'상담',icon:'◈'},card:{color:T.cyan,label:'카드뉴스',icon:'▣'},system:{color:T.textMid,label:'시스템',icon:'○'}};
  const unread=notifs.filter(n=>n.unread).length;
  return <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch',paddingBottom:16}}>
    <Hdr title="알림" onBack={onBack} sub={unread>0?`읽지 않은 알림 ${unread}건`:undefined}
      right={unread>0&&<button onClick={markAllRead} style={{background:'none',border:'none',color:T.blue,fontSize:12,cursor:'pointer',fontFamily:T.fontKr,outline:'none'}}>모두 읽음</button>}/>
    <div style={{padding:'0 20px',display:'flex',flexDirection:'column'}}>
      {notifs.map((n,i)=>{const m=meta[n.type];return(
        <div key={n.id} style={{padding:'13px 0',display:'flex',gap:13,borderTop:i===0?`0.5px solid ${T.divider}`:'none',borderBottom:`0.5px solid ${T.divider}`,opacity:n.unread?1:0.5}}>
          <div style={{width:37,height:37,borderRadius:10,flexShrink:0,background:'rgba(139,151,168,0.07)',border:`0.5px solid ${T.hairline}`,color:m.color,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>{m.icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <Ey c={m.color}>{m.label}</Ey>
              <span style={{fontSize:10,color:T.textLow,fontFamily:T.fontMono}}>{n.time}</span>
            </div>
            <div style={{fontFamily:T.fontKr,fontSize:13,color:T.textHi,lineHeight:1.55,fontWeight:n.unread?500:400}}>{n.title}</div>
          </div>
          {n.unread&&<div style={{width:7,height:7,borderRadius:4,background:T.blue,marginTop:6,flexShrink:0}}/>}
        </div>
      );})}
    </div>
  </div>;
}

/* ─── ROOT ─── */
function App(){
  const[tier,setTier]=useState('Peony');
  const[stack,setStack]=useState([{s:'home'}]);
  const[bookings,setBookings]=useState(BOOKINGS_INIT);
  const[notifs,setNotifs]=useState(NOTIFS_INIT);
  const[favorited,setFavorited]=useState(new Set());
  const[toast,setToast]=useState(null);
  const top=stack[stack.length-1];
  const nav=(s,p)=>{
    if(['home','events','cards','me'].includes(s))setStack([{s,p}]);
    else setStack(st=>[...st,{s,p}]);
  };
  const back=()=>setStack(st=>st.length>1?st.slice(0,-1):st);
  const showToast=msg=>setToast(msg);
  const toggleFav=id=>setFavorited(f=>{const n=new Set(f);n.has(id)?n.delete(id):n.add(id);return n;});
  const markAllRead=()=>setNotifs(ns=>ns.map(n=>({...n,unread:false})));
  const unread=notifs.filter(n=>n.unread).length;
  const tabId=['home','events','cards','me'].includes(top.s)?top.s:'home';
  const showTab=['home','events','cards','me'].includes(top.s);

  const props={nav,back,bookings,setBookings,favorited,toggleFav,showToast,tier};
  let screen;
  switch(top.s){
    case 'home':          screen=<HomeScreen {...props}/>; break;
    case 'events':        screen=<EventsScreen {...props}/>; break;
    case 'event-detail':  screen=<EventDetailScreen event={top.p} onBack={back} {...props}/>; break;
    case 'bookings':      screen=<BookingsScreen {...props}/>; break;
    case 'consult':       screen=<ConsultScreen onBack={back} {...props}/>; break;
    case 'cards':         screen=<CardsScreen nav={nav}/>; break;
    case 'card-detail':   screen=<CardDetailScreen card={top.p} onBack={back} nav={nav}/>; break;
    case 'me':            screen=<MeScreen {...props}/>; break;
    case 'notifications': screen=<NotifsScreen onBack={back} notifs={notifs} markAllRead={markAllRead}/>; break;
    default:              screen=null;
  }

  return (
    <div style={{position:'fixed',inset:0,background:'#0A0E14',display:'flex',flexDirection:'column',fontFamily:T.fontKr,maxWidth:480,margin:'0 auto',boxShadow:'0 0 80px rgba(0,0,0,0.8)'}}>
      <style>{`*{-webkit-tap-highlight-color:transparent;scrollbar-width:none}::-webkit-scrollbar{display:none}input,button,select{-webkit-appearance:none}`}</style>
      <StatusBar unread={unread}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minHeight:0}}>
        {screen}
      </div>
      {showTab&&<TabBar active={tabId} onChange={nav} unread={unread}/>}
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
